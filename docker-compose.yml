version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inzozi_postgres
    environment:
      POSTGRES_USER: inzozi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inzozi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inzozi_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
